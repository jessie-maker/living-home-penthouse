<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Jessica&#x27;s Local Guide 🗺️</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1410;
    --bg2: #211c16;
    --bg3: #2a231b;
    --border: #3d3228;
    --warm: #e8956d;
    --warm2: #c9724a;
    --warm-dim: #7a4a2e;
    --text: #f0e8d8;
    --text2: #b8a898;
    --text3: #7a6858;
    --cat-food: #e05252;
    --cat-coffee: #9b6b3a;
    --cat-bar: #8b52b8;
    --cat-outdoor: #4a9b5a;
    --cat-arts: #4a7bbf;
    --cat-shopping: #c9b23a;
    --cat-other: #888888;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    background: var(--bg);
    position: relative;
  }

  /* ── HEADER ── */
  #header {
    padding: 12px 16px 8px;
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  #header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--warm);
    letter-spacing: 0.5px;
    text-shadow: 2px 2px 0 var(--warm-dim);
    line-height: 1.6;
    white-space: nowrap;
  }
  #header h1 span.emoji { font-family: sans-serif; }

  /* ── TABS ── */
  #tabs {
    display: flex;
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    flex-shrink: 0;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 8px;
    font-family: 'Press Start 2P', monospace;
    font-size: 7px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.15s;
    border-bottom: 3px solid transparent;
  }
  .tab-btn.active {
    color: var(--warm);
    border-bottom-color: var(--warm);
    background: var(--bg3);
  }
  .tab-btn:hover:not(.active) {
    color: var(--text2);
    background: var(--bg3);
  }
  .badge {
    background: var(--warm-dim);
    color: var(--warm);
    font-family: 'Press Start 2P', monospace;
    font-size: 6px;
    padding: 2px 5px;
    border-radius: 2px;
    border: 1px solid var(--warm-dim);
  }
  .tab-btn.active .badge {
    background: var(--warm2);
    color: var(--bg);
  }

  /* ── FILTERS ── */
  #filters {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    overflow-x: auto;
    background: var(--bg2);
    flex-shrink: 0;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  #filters::-webkit-scrollbar { display: none; }
  .filter-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
  }
  .filter-chip.active {
    border-color: currentColor;
    background: rgba(255,255,255,0.07);
  }
  .filter-chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── MAIN (map + chat) ── */
  #main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  /* Map takes ~70% of remaining height */
  #map-wrap {
    flex: 7;
    min-height: 0;
    position: relative;
  }
  #map { width: 100%; height: 100%; }

  /* Chat takes ~30% of remaining height */
  #chat-panel {
    flex: 3;
    min-height: 160px;
    background: var(--bg2);
    border-top: 2px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  #chat-label {
    padding: 8px 14px 4px;
    font-size: 10px;
    color: var(--text3);
    font-family: 'Press Start 2P', monospace;
    flex-shrink: 0;
  }
  #chat-msgs {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 4px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    scrollbar-width: none;
  }
  #chat-msgs::-webkit-scrollbar { display: none; }
  .msg {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 16px;
    font-size: 12px;
    line-height: 1.4;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--warm2);
    color: var(--bg);
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    align-self: flex-start;
    background: var(--bg3);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  #chat-input-row {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    padding-bottom: max(8px, env(safe-area-inset-bottom));
    flex-shrink: 0;
    align-items: center;
  }
  #chat-input {
    flex: 1;
    background: var(--bg3);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 9px 14px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
  }
  #chat-input:focus { border-color: var(--warm-dim); }
  #chat-input::placeholder { color: var(--text3); }
  #chat-send {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: var(--warm2);
    border: none;
    color: var(--bg);
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
  }
  #chat-send:active { background: var(--warm); }

  /* ── Leaflet overrides ── */
  .leaflet-container {
    background: #1a1410 !important;
    font-family: 'Inter', sans-serif;
  }
  .leaflet-tile-pane { filter: brightness(0.55) saturate(0.5) sepia(0.4); }
  .leaflet-popup-content-wrapper {
    background: var(--bg2) !important;
    color: var(--text) !important;
    border: 1.5px solid var(--border) !important;
    border-radius: 10px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6) !important;
  }
  .leaflet-popup-tip { background: var(--bg2) !important; }
  .leaflet-popup-content { margin: 12px 14px !important; }
  .popup-name { font-weight: 700; font-size: 13px; margin-bottom: 4px; }
  .popup-cat { font-size: 10px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; color: var(--text2); }
  .popup-cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .popup-addr { font-size: 11px; color: var(--text2); line-height: 1.4; }
  .leaflet-control-zoom a {
    background: var(--bg2) !important;
    color: var(--warm) !important;
    border-color: var(--border) !important;
  }
  .leaflet-control-attribution {
    background: rgba(26,20,16,0.7) !important;
    color: var(--text3) !important;
    font-size: 9px !important;
  }
  .leaflet-control-attribution a { color: var(--warm-dim) !important; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <h1>JESSICA&#x27;S LOCAL GUIDE <span class="emoji">🗺️</span></h1>
  </div>

  <div id="tabs">
    <button class="tab-btn active" data-tab="nyc" onclick="switchTab('nyc')">🗽 NYC <span class="badge" id="nyc-count">0</span></button>
    <button class="tab-btn" data-tab="bayarea" onclick="switchTab('bayarea')">🌉 BAY AREA <span class="badge" id="ba-count">0</span></button>
  </div>

  <div id="filters">
    <button class="filter-chip active" data-cat="all" onclick="toggleFilter(this)">✦ All</button>
    <button class="filter-chip active" data-cat="food" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-food)"></span>Food</button>
    <button class="filter-chip active" data-cat="coffee" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-coffee)"></span>Coffee</button>
    <button class="filter-chip active" data-cat="bar" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-bar)"></span>Bars</button>
    <button class="filter-chip active" data-cat="outdoor" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-outdoor)"></span>Outdoors</button>
    <button class="filter-chip active" data-cat="arts" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-arts)"></span>Arts</button>
    <button class="filter-chip active" data-cat="shopping" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-shopping)"></span>Shopping</button>
    <button class="filter-chip active" data-cat="other" onclick="toggleFilter(this)"><span class="dot" style="background:var(--cat-other)"></span>Other</button>
  </div>

  <div id="main">
    <div id="map-wrap"><div id="map"></div></div>

    <div id="chat-panel">
      <div id="chat-label">ASK FOR RECS 💬</div>
      <div id="chat-msgs">
        <div class="msg bot">hey! tap any pin to explore, or ask me for recs 🗺️</div>
      </div>
      <div id="chat-input-row">
        <input id="chat-input" type="text" placeholder="Ask me for recommendations..." autocomplete="off" autocorrect="off"/>
        <button id="chat-send" onclick="sendChat()">↑</button>
      </div>
    </div>
  </div>
</div>

let currentTab = 'nyc';

let clusterGroup = null;

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function makeIcon(cat) {
  const color = CAT_COLORS[cat] || '#888';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="22" height="28" viewBox="0 0 22 28">
    <defs>
      <filter id="s${cat}" x="-50%" y="-50%" width="200%" height="200%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(0,0,0,0.5)"/>
      </filter>
    </defs>
    <path d="M11 0C5.477 0 1 4.477 1 10c0 7.5 10 18 10 18S21 17.5 21 10c0-5.523-4.477-10-10-10z"
      fill="${color}" stroke="rgba(0,0,0,0.4)" stroke-width="1.5" filter="url(#s${cat})"/>
    <circle cx="11" cy="10" r="4" fill="rgba(255,255,255,0.9)"/>
  </svg>`;
  return L.divIcon({ html: svg, iconSize: [22,28], iconAnchor: [11,28], popupAnchor: [0,-28], className: '' });
}

function gmapsUrl(p) {
  return 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(p.n + ' ' + (p.a||''));
}

function buildPopup(p) {
  const color = CAT_COLORS[p.c] || '#888';
  const label = CAT_LABELS[p.c] || 'Other';
  const addr = p.a ? `<div class="popup-addr">${escHtml(p.a)}</div>` : '';
  const link = `<a href="${gmapsUrl(p)}" target="_blank" rel="noopener" style="display:inline-block;margin-top:6px;padding:4px 10px;background:${color};color:#fff;border-radius:6px;font-size:11px;text-decoration:none;font-weight:600">View on Google Maps ↗</a>`;
  return `<div class="popup-name">${escHtml(p.n)}</div>
  <div class="popup-cat"><span class="popup-cat-dot" style="background:${color}"></span>${label}</div>
  ${addr}${link}`;
}

function buildMarkers() {
  allMarkers = { nyc: [], bayarea: [] };
  PLACES.nyc.forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.c) });
    m.bindPopup(buildPopup(p), { maxWidth: 220 });
    m._catData = p.c;
    allMarkers.nyc.push(m);
  });
  PLACES.bayarea.forEach(p => {
    const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.c) });
    m.bindPopup(buildPopup(p), { maxWidth: 220 });
    m._catData = p.c;
    allMarkers.bayarea.push(m);
  });

  document.getElementById('nyc-count').textContent = PLACES.nyc.length;
  document.getElementById('ba-count').textContent = PLACES.bayarea.length;
}

function renderMarkers() {
  if (clusterGroup) map.removeLayer(clusterGroup);
  clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 50,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    zoomToBoundsOnClick: true,
    iconCreateFunction: function(cluster) {
      const n = cluster.getChildCount();
      return L.divIcon({
        html: `<div style="background:rgba(232,149,109,0.85);color:#1a1410;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;border:2px solid rgba(232,149,109,0.4);box-shadow:0 2px 8px rgba(0,0,0,0.4)">${n}</div>`,
        iconSize: [36,36],
        iconAnchor: [18,18],
        className: ''
      });
    }
  });

  allMarkers[currentTab].forEach(m => {
    if (activeFilters.has(m._catData)) clusterGroup.addLayer(m);
  });

  map.addLayer(clusterGroup);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  if (tab === 'nyc') map.setView([40.735, -73.99], 13);
  else map.setView([37.45, -122.05], 10);
  renderMarkers();
}

function toggleFilter(chip) {
  const cat = chip.dataset.cat;
  if (cat === 'all') {
    const chips = [...document.querySelectorAll('.filter-chip[data-cat]:not([data-cat="all"])')];
    const anyOff = chips.some(c => !c.classList.contains('active'));
    if (anyOff) {
      activeFilters = new Set(['food','coffee','bar','outdoor','arts','shopping','other']);
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.add('active'));
    } else {
      activeFilters.clear();
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    }
  } else {
    if (activeFilters.has(cat)) { activeFilters.delete(cat); chip.classList.remove('active'); }
    else { activeFilters.add(cat); chip.classList.add('active'); }

    const allActive = [...document.querySelectorAll('.filter-chip[data-cat]:not([data-cat="all"])')].every(c => c.classList.contains('active'));
    document.querySelector('.filter-chip[data-cat="all"]').classList.toggle('active', allActive);
  }
  renderMarkers();
}

const REGION_ALIASES = {
  'nyc':['nyc','new york','manhattan','brooklyn','queens'],
  'sf':['sf','san francisco','the city'],
  'south bay':['south bay','peninsula','palo alto','mountain view','sunnyvale','cupertino','san jose','santa clara','menlo park','redwood city','los altos','milpitas','san mateo','fremont'],
  'east bay':['east bay','oakland','berkeley','livermore'],
  'other ca':['la','los angeles','tahoe','yosemite','monterey','napa','yountville','big sur','santa cruz','beverly hills']
};

function searchPlaces(query) {
  const allPlaces = [...PLACES.nyc.map(p=>({...p,region:'NYC'})), ...PLACES.bayarea.map(p=>({...p,region:p.r||'Bay Area'}))];

  // detect region filter
  let regionFilter = null;
  for (const [key, aliases] of Object.entries(REGION_ALIASES)) {
    if (aliases.some(a => query.includes(a))) { regionFilter = key; break; }
  }

  // detect category filter
  let catFilter = null;
  const catKeywords = {
    food:['restaurant','food','eat','dinner','lunch','brunch','noodle','rice','ramen','sushi','dumpling','bbq','korean','japanese','chinese','thai','italian','french','mexican','vietnamese','seafood','steak','pizza','pasta','izakaya','omakase','hot pot','shabu','yakitori','pho','curry','taco','burger','bakery','pastry','cake','dessert','dim sum','tofu'],
    coffee:['coffee','cafe','café','tea','matcha','latte'],
    bar:['bar','cocktail','drink','wine','beer','nightlife','club','ktv','karaoke','lounge','jazz','pub','happy hour'],
    outdoor:['outdoor','park','trail','hike','hiking','beach','nature','lake','walk','garden','view','scenic'],
    arts:['art','museum','gallery','culture','exhibit','theater','theatre','symphony','opera','design'],
    shopping:['shop','shopping','store','market','grocery','mall','boutique','fashion']
  };
  for (const [cat, kws] of Object.entries(catKeywords)) {
    if (kws.some(k => query.includes(k))) { catFilter = cat; break; }
  }

  // filter places
  let results = allPlaces;
  if (regionFilter) {
    const aliases = REGION_ALIASES[regionFilter];
    results = results.filter(p => {
      const r = (p.region||'').toLowerCase();
      if (regionFilter === 'nyc') return r === 'nyc';
      if (regionFilter === 'sf') return r === 'sf';
      if (regionFilter === 'south bay') return r.includes('south bay') || r.includes('peninsula');
      if (regionFilter === 'east bay') return r.includes('east bay');
      if (regionFilter === 'other ca') return r.includes('other ca');
      return true;
    });
  }
  if (catFilter) {
    results = results.filter(p => p.c === catFilter);
  }

  // fuzzy name search with stop words removed + relevance scoring
  const STOP = new Set(['the','and','give','get','me','my','good','best','great','nice','really','very','some','any','place','places','spot','spots','restaurant','restaurants','from','your','list','want','find','show','try','recommend','recommendation','recommendations','what','where','how','about','for','with','this','that','have','are','can','you','know','like','near','nearby','around','here','there']);

  if (!catFilter && !regionFilter) {
    const words = query.split(/\s+/).filter(w => w.length > 2 && !STOP.has(w));
    if (words.length > 0) {
      results = allPlaces.map(p => {
        const haystack = (p.n + ' ' + (p.a||'')).toLowerCase();
        let score = 0;
        for (const w of words) {
          if (haystack.includes(w)) score += (p.n.toLowerCase().includes(w) ? 3 : 1);
        }
        return {...p, score};
      }).filter(p => p.score > 0).sort((a,b) => b.score - a.score);
    } else {
      results = [];
    }
  } else if (catFilter || regionFilter) {
    // also boost by name relevance within filtered results
    const words = query.split(/\s+/).filter(w => w.length > 2 && !STOP.has(w));
    if (words.length > 0) {
      results = results.map(p => {
        const haystack = (p.n + ' ' + (p.a||'')).toLowerCase();
        let score = 1;
        for (const w of words) {
          if (haystack.includes(w)) score += (p.n.toLowerCase().includes(w) ? 3 : 1);
        }
        return {...p, score};
      }).sort((a,b) => b.score - a.score);
    }
  }

  if (results.length === 0) {
    return { picks: [], total: 0 };
  }

  // pick top 3 by relevance
  const picks = results.slice(0, 3);
  return { picks, total: results.length };
}

function sendChat() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text) return;
  const msgs = document.getElementById('chat-msgs');

  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = text;
  msgs.appendChild(userMsg);

  const lower = text.toLowerCase();
  const result = searchPlaces(lower);

  setTimeout(() => {
    const botMsg = document.createElement('div');
    botMsg.className = 'msg bot';

    if (result.picks.length === 0) {
      botMsg.textContent = 'hmm nothing matches that — try "sushi in palo alto" or "coffee in SF" or just a cuisine like "thai" :)';
    } else {
      const header = result.total > 3
        ? `<div style="margin-bottom:8px">found ${result.total} spots! here are my top picks:</div>`
        : '';
      const cards = result.picks.map(p => {
        const color = CAT_COLORS[p.c] || '#888';
        const label = CAT_LABELS[p.c] || 'Other';
        const gurl = gmapsUrl(p);
        return `<div class="rec-card" data-lat="${p.lat}" data-lng="${p.lng}" data-name="${escHtml(p.n)}" onclick="flyToPlace(this)" style="cursor:pointer;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:10px 12px;margin-bottom:6px">
          <div style="font-weight:600;font-size:13px;color:var(--text)">${escHtml(p.n)}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:2px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle"></span>${label}${p.region ? ' · ' + p.region : ''}</div>
          ${p.a ? '<div style="font-size:11px;color:var(--text3);margin-top:2px">' + escHtml(p.a.split(',')[0]) + '</div>' : ''}
          <div style="margin-top:6px;display:flex;gap:6px">
            <span style="font-size:10px;color:var(--warm);text-decoration:underline;cursor:pointer" onclick="event.stopPropagation();flyToPlace(this.closest('.rec-card'))">📍 Show on map</span>
            <a href="${gurl}" target="_blank" rel="noopener" onclick="event.stopPropagation()" style="font-size:10px;color:var(--warm);text-decoration:underline">↗ Google Maps</a>
          </div>
        </div>`;
      }).join('');
      const footer = result.total > 3 ? '<div style="font-size:11px;color:var(--text3);margin-top:4px">(ask again to explore more!)</div>' : '';
      botMsg.innerHTML = header + cards + footer;
    }

    msgs.appendChild(botMsg);
    msgs.scrollTop = msgs.scrollHeight;
  }, 350);

  input.value = '';
  msgs.scrollTop = msgs.scrollHeight;
}

function flyToPlace(card) {
  const lat = parseFloat(card.dataset.lat);
  const lng = parseFloat(card.dataset.lng);
  const name = card.dataset.name;

  // switch to correct tab
  const isNyc = PLACES.nyc.some(p => Math.abs(p.lat-lat)<0.001 && Math.abs(p.lng-lng)<0.001);
  if (isNyc && currentTab !== 'nyc') switchTab('nyc');
  if (!isNyc && currentTab !== 'bayarea') switchTab('bayarea');

  // fly to location
  map.flyTo([lat, lng], 16, { duration: 0.8 });

  // find and open the marker popup
  setTimeout(() => {
    const markers = allMarkers[currentTab] || [];
    const places = currentTab === 'nyc' ? PLACES.nyc : PLACES.bayarea;
    for (let i = 0; i < places.length; i++) {
      if (Math.abs(places[i].lat - lat) < 0.0001 && Math.abs(places[i].lng - lng) < 0.0001) {
        const marker = markers[i];
        if (marker) {
          if (clusterGroup && clusterGroup.hasLayer(marker)) {
            clusterGroup.zoomToShowLayer(marker, () => { marker.openPopup(); });
          } else {
            marker.openPopup();
          }
        }
        break;
      }
    }
  }, 900);

  // pulse highlight on the card
  card.style.boxShadow = '0 0 12px var(--warm)';
  setTimeout(() => { card.style.boxShadow = ''; }, 1500);
}

document.getElementById('chat-input').addEventListener('keydown', e => { if (e.key === 'Enter') sendChat(); });

buildMarkers();
switchTab('nyc');
</script>
